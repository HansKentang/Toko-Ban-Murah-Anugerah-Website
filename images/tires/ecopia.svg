<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="tireGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5a6a5a"/>
      <stop offset="58%" stop-color="#5a6a5a"/>
      <stop offset="62%" stop-color="#2d3a2d"/>
      <stop offset="85%" stop-color="#2d3a2d"/>
      <stop offset="88%" stop-color="#1d2a1d"/>
      <stop offset="100%" stop-color="#2d3a2d"/>
    </radialGradient>
    <clipPath id="clip">
      <circle cx="100" cy="100" r="90"/>
