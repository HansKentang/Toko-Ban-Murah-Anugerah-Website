  <!-- Highlight/shine -->
  <ellipse cx="75" cy="75" rx="30" ry="20" fill="white" opacity="0.06" transform="rotate(-30 75 75)"/>
  <!-- Label -->
  <text x="100" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white" opacity="0.8">ECOPIA</text>
