    <path d="M100 188 Q85 170 80 155" />
    <path d="M12 100 Q30 85 45 80" />
    <path d="M188 100 Q170 85 155 80" />
    <path d="M50 25 Q60 40 65 55" />
    <path d="M150 25 Q140 40 135 55" />
    <path d="M50 175 Q60 160 65 145" />
    <path d="M150 175 Q140 160 135 145" />
    <path d="M25 50 Q40 60 55 65" />
    <path d="M175 50 Q160 60 145 65" />
    <path d="M25 150 Q40 140 55 135" />
    <path d="M175 150 Q160 140 145 135" />
  </g>
  <!-- Tread blocks on outer edge -->
  <g fill="#1d2a1d" opacity="0.5">
    <rect x="95" y="6" width="10" height="8" rx="1"/>
    <rect x="145" y="20" width="8" height="10" rx="1" transform="rotate(45 149 25)"/>
    <rect x="180" y="70" width="8" height="10" rx="1"/>
    <rect x="180" y="120" width="8" height="10" rx="1"/>
    <rect x="145" y="170" width="8" height="10" rx="1" transform="rotate(-45 149 175)"/>
    <rect x="95" y="186" width="10" height="8" rx="1"/>
    <rect x="47" y="170" width="8" height="10" rx="1" transform="rotate(45 51 175)"/>
