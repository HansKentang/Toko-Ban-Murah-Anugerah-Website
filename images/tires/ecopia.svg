    <line x1="155" y1="100" x2="135" y2="100"/>
    <line x1="100" y1="155" x2="100" y2="135"/>
    <line x1="45" y1="100" x2="65" y2="100"/>
    <line x1="139" y1="61" x2="125" y2="75"/>
    <line x1="139" y1="139" x2="125" y2="125"/>
    <line x1="61" y1="139" x2="75" y2="125"/>
    <line x1="61" y1="61" x2="75" y2="75"/>
  </g>
  <!-- Rim center -->
