<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="tireGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#2a2a2a"/>
      <stop offset="75%" stop-color="#1a1a1a"/>
      <stop offset="85%" stop-color="#333"/>
      <stop offset="95%" stop-color="#222"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <radialGradient id="hubGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#333"/>
    </radialGradient>
    <radialGradient id="treadGrad" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#1a1a1a"/>
      <stop offset="85%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
  </defs>
  <!-- Outer tire shadow -->
  <circle cx="100" cy="100" r="96" fill="#0a0a0a" opacity="0.3"/>
  <!-- Main tire body -->
  <circle cx="100" cy="100" r="94" fill="url(#tireGrad)"/>
  <!-- Outer rim -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#444" stroke-width="2"/>
  <!-- Tread area (outer ring) -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#1a1a1a" stroke-width="18"/>
  <!-- Tread groove ring -->
  <circle cx="100" cy="100" r="76" fill="none" stroke="#0f0f0f" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Inner groove -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#0f0f0f" stroke-width="1" stroke-dasharray="3 4"/>
  <!-- Tread pattern - circumferential grooves -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#252525" stroke-width="0.5" stroke-dasharray="2 5"/>
  <!-- Sidewall ring -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <circle cx="100" cy="100" r="58" fill="none" stroke="#3a3a3a" stroke-width="0.5"/>
  <!-- Hub/rim -->
  <circle cx="100" cy="100" r="42" fill="url(#hubGrad)"/>
  <circle cx="100" cy="100" r="42" fill="none" stroke="#555" stroke-width="1.5"/>
  <!-- Rim spokes -->
  <g stroke="#555" stroke-width="3" opacity="0.8">
    <line x1="100" y1="60" x2="100" y2="80"/>
    <line x1="100" y1="120" x2="100" y2="140"/>
    <line x1="60" y1="100" x2="80" y2="100"/>
    <line x1="120" y1="100" x2="140" y2="100"/>
    <line x1="72" y1="72" x2="85" y2="85"/>
    <line x1="128" y1="72" x2="115" y2="85"/>
    <line x1="72" y1="128" x2="85" y2="115"/>
    <line x1="128" y1="128" x2="115" y2="115"/>
  </g>
  <!-- Hub center -->
  <circle cx="100" cy="100" r="12" fill="#444"/>
  <circle cx="100" cy="100" r="5" fill="#555"/>
  <!-- Sidewall highlights -->
  <ellipse cx="100" cy="100" rx="70" ry="70" fill="none" stroke="#3a3a3a" stroke-width="0.3" stroke-dasharray="1 6"/>
  <!-- Tire name area highlight -->
  <path d="M 38 100 A 62 62 0 0 1 162 100" fill="none" stroke="#444" stroke-width="0.5" stroke-dasharray="2 3"/>
  <!-- Subtle highlights -->
  <ellipse cx="90" cy="88" rx="40" ry="30" fill="white" opacity="0.03"/>
</svg>
