<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 70" fill="none">
  <defs>
    <linearGradient id="bh-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="220" height="70" rx="8" fill="url(#bh-grad)"/>
  <!-- Hawk head icon - more detailed -->
  <g transform="translate(18, 8)">
    <!-- Head base -->
    <path d="M0 38 L3 12 L10 4 L18 4 L25 12 L28 38 Z" fill="url(#gold-grad)"/>
    <path d="M3 12 L10 4 L18 4 L25 12 L22 38 L6 38 Z" fill="#e8921e"/>
    <!-- Brow ridge -->
    <path d="M4 14 L10 10 L18 10 L24 14" stroke="#b8860b" stroke-width="1" fill="none"/>
    <!-- Eye -->
    <circle cx="14" cy="17" r="4.5" fill="#0d0d1a"/>
    <circle cx="13.5" cy="16.5" r="2" fill="#fff"/>
    <circle cx="13" cy="16" r="1" fill="#0d0d1a"/>
    <!-- Sharp beak -->
    <path d="M28 20 L40 24 L30 28 Z" fill="url(#gold-grad)"/>
    <path d="M28 20 L40 24 L30 26 Z" fill="#b8860b" opacity="0.5"/>
    <!-- Talon/claw -->
    <path d="M8 48 L14 42 L20 48 Q14 54 8 48Z" fill="url(#gold-grad)"/>
    <path d="M8 48 L11 45 L14 48 Q11 51 8 48Z" fill="#b8860b" opacity="0.5"/>
    <!-- Feather detail lines -->
    <path d="M8 28 L14 30 M10 34 L16 36 M6 40 L12 42" stroke="#b8860b" stroke-width="1" fill="none" opacity="0.5"/>
  </g>
  <!-- BLACKHAWK text -->
  <text x="72" y="32" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="900" fill="#ffffff" letter-spacing="3">BLACKHAWK</text>
  <!-- Tagline -->
  <text x="72" y="50" font-family="Arial, sans-serif" font-size="10" fill="#f5a623" letter-spacing="4" font-weight="700">PREMIUM TIRES</text>
  <!-- Gold underline -->
  <line x1="72" y1="56" x2="200" y2="56" stroke="#f5a623" stroke-width="1" opacity="0.4"/>
</svg>
