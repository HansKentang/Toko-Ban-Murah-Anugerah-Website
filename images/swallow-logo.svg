<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 100" width="500" height="100">
  <defs>
    <linearGradient id="swallow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b2d8e"/>
      <stop offset="100%" stop-color="#8e44ad"/>
    </linearGradient>
  </defs>
  <!-- Swallow bird icon - stylized flying swallow -->
  <g transform="translate(10, 15)">
    <!-- Left wing (swept back) -->
    <path d="M50 35 Q30 12 8 8 Q25 18 35 28 Q32 30 28 30 Q35 35 50 35Z" fill="url(#swallow-grad)" opacity="0.85"/>
    <!-- Right wing (swept forward) -->
    <path d="M50 35 Q65 18 75 8 Q68 20 62 28 Q65 30 70 30 Q62 34 50 35Z" fill="url(#swallow-grad)" opacity="0.85"/>
    <!-- Body -->
    <path d="M50 35 Q47 42 44 50 L50 60 L56 50 Q53 42 50 35Z" fill="#5b2d8e"/>
    <!-- Forked tail -->
    <path d="M44 50 L35 62 L42 54 M56 50 L65 62 L58 54" stroke="#5b2d8e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Speed motion lines -->
    <path d="M15 22 L25 18 M10 30 L22 26 M12 38 L20 36" stroke="#8e44ad" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  </g>
  <!-- SWALLOW text -->
  <text x="100" y="55" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="900" fill="#5b2d8e" letter-spacing="2">SWALLOW</text>
  <!-- TIRES tagline -->
  <text x="100" y="78" font-family="Arial, sans-serif" font-size="14" fill="#8e44ad" letter-spacing="6" font-weight="600">TIRES</text>
  <!-- Underline accent -->
  <line x1="100" y1="85" x2="350" y2="85" stroke="#8e44ad" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
</svg>
